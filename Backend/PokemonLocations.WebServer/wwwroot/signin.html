<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign In — PokéLocs</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
    <script>
        (function () {
            const valid = ['bulbasaur', 'charmander', 'squirtle', 'pikachu'];
            const cached = sessionStorage.getItem('pl.theme');
            const name = valid.includes(cached) ? cached : 'pikachu';
            document.write(`<link id="theme-stylesheet" rel="stylesheet" href="/css/themes/${name}.css">`);
        })();
    </script>
    <style>
        body {
            font-family: 'Inter', Arial, sans-serif;
            background: var(--theme-primary-pale);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .auth-card {
            background: #FFF;
            border-radius: 12px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
            padding: 2.5rem;
            width: 100%;
            max-width: 420px;
        }
        .auth-card h1 {
            color: var(--theme-primary-dark);
            font-weight: 700;
            margin-bottom: 1.5rem;
        }
        .btn-primary {
            background: var(--theme-primary);
            border-color: var(--theme-primary);
        }
        .btn-primary:hover, .btn-primary:focus {
            background: var(--theme-primary-dark);
            border-color: var(--theme-primary-dark);
        }
    </style>
</head>
<body>
    <div class="auth-card">
        <h1>Sign in to PokéLocs</h1>
        <form id="signin-form" novalidate>
            <div class="mb-3">
                <label for="email" class="form-label">Email</label>
                <input type="email" class="form-control" id="email" required autocomplete="username" />
            </div>
            <div class="mb-3">
                <label for="password" class="form-label">Password</label>
                <input type="password" class="form-control" id="password" required autocomplete="current-password" />
            </div>
            <div id="error-message" class="alert alert-danger d-none" role="alert"></div>
            <button type="submit" class="btn btn-primary w-100">Sign in</button>
            <p class="text-center mt-3 mb-0">
                Don't have an account? <a href="/signup.html">Sign up</a>
            </p>
        </form>
    </div>

    <script src="/js/auth.js"></script>
    <script>
        const form = document.getElementById('signin-form');
        const errorBox = document.getElementById('error-message');
        const submit = form.querySelector('button[type="submit"]');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorBox.classList.add('d-none');

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            if (!email || !password) {
                errorBox.textContent = 'Please enter your email and password.';
                errorBox.classList.remove('d-none');
                return;
            }

            submit.disabled = true;
            try {
                const res = await fetch('/api/me', {
                    headers: { Authorization: PLAuth.buildBasicHeader(email, password) }
                });
                if (res.ok) {
                    PLAuth.setCreds(email, password);
                    location.href = '/';
                } else if (res.status === 401) {
                    errorBox.textContent = 'Invalid email or password.';
                    errorBox.classList.remove('d-none');
                } else {
                    errorBox.textContent = `Sign-in failed (${res.status}).`;
                    errorBox.classList.remove('d-none');
                }
            } catch (err) {
                errorBox.textContent = 'Network error. Please try again.';
                errorBox.classList.remove('d-none');
            } finally {
                submit.disabled = false;
            }
        });
    </script>
</body>
</html>
