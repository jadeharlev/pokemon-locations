<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Track your Pokémon Red journey — badges, visited locations, buildings, and notes." />
  <title>PokéLocs</title>

  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="/favicon-192.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="/favicon-180.png" />

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
  <link id="theme-stylesheet" rel="stylesheet" href="/css/themes/bulbasaur.css" />

  <style>

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: 'Inter', Arial, sans-serif;
      color: var(--theme-text);
      background: #FAFAFA;
    }

    /* ── Top bar ── */
    .top-bar {
      background: var(--theme-primary-dark);
      color: #FFF;
      text-align: center;
      padding: 9px 0;
      font-size: 25px;
      font-weight: 700;
      letter-spacing: 0px;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── Layout ── */
    .app-container {
      display: grid;
      grid-template-columns: 330px minmax(0, 1fr) 280px;
      gap: 0;
      min-height: calc(100vh - 48px);
    }

    .panel {
      padding: 30px;
      border-right: 4px solid var(--theme-primary-dark);
    }
    .panel:last-child { border-right: none; }
    #buildings-panel { border-left: none; }

    /* No border between location detail (col 2) and locations list (col 2) */
    #location-panel {
      border-right: 4px solid var(--theme-primary-dark);
      display: flex;
      flex-direction: row;
      gap: 45px;
      padding-top: 30px;
      padding-bottom: 30px;
      padding-left: 45px;
      padding-right: 45px;
      min-width: 0;
    }

    .location-info-col {
      flex: 1.45;
      min-width: 0;
    }

    .locations-list-col {
      flex: 1;
      min-width: 0;
    }




    /* ─Location name with inline dropdown ── */

	.location-dropdown-toggle {
  	  border: 2px solid var(--theme-primary);
	  border-radius: 13px;
	  background-color: #fff;
	  color: var(--theme-primary-dark);
	  font-size: 30px;
	  font-weight: 700;
	  padding: 8px 16px;
	  min-width: 260px;
	  text-align: left;
	  box-shadow: 0 4px 10px rgba(0, 0, 0, 0.08);
	}

	.location-dropdown-toggle:hover,
	.location-dropdown-toggle:focus {
	  border-color: var(--theme-primary-dark);
	  background-color: var(--theme-primary-pale);
	  color: var(--theme-primary-dark);
	}

	.location-dropdown-menu {
	  max-height: 320px;
	  overflow-y: auto;
	  border: 2px solid var(--theme-primary);
	  border-radius: 13px;
	  box-shadow: 0 8px 20px rgba(0, 0, 0, 0.12);
	}

	.location-dropdown-menu .dropdown-item {
	  font-size: 18px;
	  padding: 10px 16px;
	}

	.location-dropdown-menu .dropdown-item:hover,
	.location-dropdown-menu .dropdown-item:focus {
	  background-color: var(--theme-primary-pale);
	  color: var(--theme-primary-dark);
	}


    /* ── Badge Progress (Column 1) ── */
    .panel-header {
      font-weight: 700;
      font-size: 33px;
      margin-bottom: 18px;
    }

    #buildings-panel .panel-header {
      font-size: 37px;
    }
    .ring-container {
      display: flex;
      justify-content: center;
      margin-bottom: 20px;
    }

    .ring-chart {
      position: relative;
      width: 220px;
      height: 220px;
    }

    .ring-chart svg {
      transform: rotate(-90deg);
      width: 220px;
      height: 220px;
    }

    .ring-bg {
      fill: none;
      stroke: var(--theme-ring-bg);
      stroke-width: 18;
    }

    .ring-fill {
      fill: none;
      stroke: var(--theme-primary);
      stroke-width: 18;
      stroke-linecap: round;
      transition: stroke-dashoffset 0.15s ease;
    }

    .ring-label {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      font-weight: 700;
    }

    .badge-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .badge-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 10px 0;
      cursor: pointer;
      user-select: none;
      font-size: 27px;
    }

    .badge-check {
      width: 24px;
      height: 24px;
      border: 2px solid var(--theme-primary);
      border-radius: 0px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s ease;
    }

    .badge-check.earned {
      background: var(--theme-check-fill);
      border-color: var(--theme-check-fill);
    }

    /* ── Location Detail (Column 2) ── */

    .location-status {
      font-size: 28px;
      margin-bottom: 18px;
    }

    .status-visited { color: var(--theme-primary); font-weight: 600; }
    .status-not-visited { color: var(--theme-danger); font-weight: 600; }

    .location-description {
      font-size: 22px;
      color: var(--theme-text);
      line-height: 1.4;
      margin-bottom: 24px;
    }

    .image-gallery {
      background: var(--theme-primary-pale);
      border: 1px solid var(--theme-primary);
      border-radius: 0px;
      width: 100%;
      height: 247px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 18px;
      padding: 12px;
      color: var(--theme-primary);
      font-size: 22px;
      overflow: auto;
      gap: 8px;
    }

    .image-gallery img {
      max-height: 160px;
      border-radius: 6px;
      object-fit: cover;
    }

    .notes-area {
      width: 100%;
      flex: 1;
      min-height: 178px;
      border: 1px solid var(--theme-primary);
      border-radius: 0px;
      padding: 13px;
      font-family: 'Inter', Arial, sans-serif;
      font-size: 22px;
      resize: none;
      transition: border-color 0.2s;
    }

    .notes-area:focus {
      outline: none;
      border-color: var(--theme-primary);
    }

    .notes-saved {
      font-size: 0.8rem;
      color: var(--theme-primary);
      margin-top: 4px;
      opacity: 0;
      transition: opacity 0.3s;
    }

    .notes-saved.visible { opacity: 1; }

    /* ── Locations / Buildings List (Column 3) ── */

    .building-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .building-item {
      display: flex;
      align-items: center;
      gap: 15px;
      padding: 10px 0;
      cursor: pointer;
      user-select: none;
      font-size: 26px;
      border-bottom: 0px solid #EEE;
    }

    .building-item:last-child { border-bottom: none; }

    .building-check {
      width: 34px;
      height: 34px;
      border: 2px solid var(--theme-primary);
      border-radius: 0px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s ease;
    }

    .building-check.visited {
      background: var(--theme-check-fill);
      border-color: var(--theme-check-fill);
    }

    /* ── User Status (Column 4) ── */
    #status-panel {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      text-align: center;
    }

    #status-panel .panel-header,
    #status-panel .stats-section h6 {
      text-align: center;
      font-size: 22px;
      font-weight: 700;
    }

    .user-info p {
      margin: 0 0 9px 0;
      font-size: 22px;
    }

    .user-info strong {
      color: var(--theme-primary);
    }

    .stats-section {
      margin: 0;
    }

    .stats-section h6 {
      font-weight: 700;
      margin-bottom: 9px;
      font-size: 22px;
    }

    .stats-section p {
      margin: 0 0 6px 0;
      font-size: 22px;
    }

    .action-buttons {
      margin: 0;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .btn-action {
      border: 2px solid var(--theme-text);
      background: #FFF;
      border-radius: 13px;
      padding: 9px 13px;
      font-size: 19px;
      font-weight: 700;
      font-family: 'Inter', Arial, sans-serif;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
    }

    .btn-action:hover {
      background: #F5F5F5;
      border-color: var(--theme-primary);
    }

    .btn-danger {
      color: var(--theme-danger);
      border-color: var(--theme-danger);
    }

    .btn-danger:hover {
      background: #FFEBEE;
    }

    /* ── Loading state ── */
    .loading-text {
      color: var(--theme-muted);
      font-style: italic;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>

  <div class="top-bar" id="top-bar">PokéLocs</div>

  <div class="app-container">

    <!-- Column 1: Badge Progress -->
    <div class="panel" id="badge-panel">
      <div class="panel-header">Badge Progress</div>

      <div class="ring-container">
        <div class="ring-chart">
          <svg viewBox="0 0 220 220" width="220" height="220">
            <circle class="ring-bg" cx="110" cy="110" r="101" />
            <circle class="ring-fill" id="ring-fill" cx="110" cy="110" r="101"
              stroke-dasharray="634.60"
              stroke-dashoffset="634.60" />
          </svg>
          <div class="ring-label" id="ring-label">0/8</div>
        </div>
      </div>

      <ul class="badge-list" id="badge-list"></ul>
    </div>

    <!-- Column 2: Selected Location Detail & Buildings List -->
    <div class="panel" id="location-panel">
      <div class="location-info-col">
        <div class="location-name-wrapper dropdown">
            <button
              class="btn location-dropdown-toggle dropdown-toggle"
              type="button"
              id="location-dropdown-button"
              data-bs-toggle="dropdown"
              aria-expanded="false">
              Loading...
            </button>

            <ul
              class="dropdown-menu location-dropdown-menu"
              id="location-dropdown-menu"
              aria-labelledby="location-dropdown-button">
            </ul>
        </div>
   	<div class="location-status" id="location-status"></div>
        <div class="location-description" id="location-description"></div>
        <div class="image-gallery" id="image-gallery">Image Gallery</div>

        <textarea class="notes-area" id="notes-area" placeholder="Add your notes..."></textarea>
        <div class="notes-saved" id="notes-saved">Notes saved</div>
      </div>

      <div class="locations-list-col">
        <div class="panel-header">Locations List</div>
        <ul class="building-list" id="building-list"></ul>
      </div>
    </div>

    <!-- Column 4: Current Status -->
    <div class="panel" id="status-panel">
      <div class="status-block">
        <div class="panel-header">Current Status</div>
        <div class="user-info" id="user-info">
          <p class="loading-text">Loading…</p>
        </div>
      </div>

      <div class="stats-section">
        <h6>Your Stats</h6>
        <p>Gyms Complete: <strong id="stat-gyms">0</strong></p>
        <p>Locations Visited: <strong id="stat-locations">0</strong></p>
        <p>Buildings Visited: <strong id="stat-buildings">0</strong></p>
      </div>

      <div class="action-buttons">
        <button class="btn-action btn-danger" id="btn-delete-account">Delete Account</button>
        <button class="btn-action" id="btn-change-theme">Change Theme</button>
        <button class="btn-action" id="btn-log-out">Log Out</button>
      </div>
    </div>

  </div>

  <div class="modal fade" id="theme-modal" tabindex="-1" aria-labelledby="theme-modal-label" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="theme-modal-label">Choose a theme</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <div class="d-grid gap-2">

            <button class="btn btn-outline-secondary theme-option" data-theme="random">Random</button>
            
            <button class="btn btn-outline-secondary theme-option" data-theme="bulbasaur">Bulbasaur (Green)</button>
            <button class="btn btn-outline-secondary theme-option" data-theme="charmander">Charmander (Red)</button>
            <button class="btn btn-outline-secondary theme-option" data-theme="squirtle">Squirtle (Blue)</button>
            <button class="btn btn-outline-secondary theme-option" data-theme="pikachu">Pikachu (Yellow)</button>


            <button class="btn btn-outline-secondary theme-option" data-theme="rattata">Rattata (Purple)</button>
            <button class="btn btn-outline-secondary theme-option" data-theme="diglett">Diglett (Brown)</button>
            <button class="btn btn-outline-secondary theme-option" data-theme="geodude">Geodude (Gray)</button>
            <button class="btn btn-outline-secondary theme-option" data-theme="dratini">Dratini (Light Blue)</button>
            <button class="btn btn-outline-secondary theme-option" data-theme="mew">Mew (Pink)</button>
            <button class="btn btn-outline-secondary theme-option" data-theme="dragonite">Dragonite (Orange)</button>

          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/auth.js" defer></script>
  <script src="script.js" defer></script>
</body>
</html>
