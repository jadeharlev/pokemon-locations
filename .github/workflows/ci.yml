name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Start containers
        run: docker compose -f docker-compose.debug.yml up -d db cache

      - name: Wait for Postgres to be ready
        run: |
          until docker exec PokemonLocations-DB pg_isready -U postgres; do
            sleep 2
          done

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore Backend/Backend.sln

      - name: Build
        run: dotnet build Backend/Backend.sln --no-restore

      - name: Test
        run: dotnet test Backend/Backend.sln --no-build

      - name: Stop containers
        if: always()
        run: docker compose -f docker-compose.debug.yml down -v
