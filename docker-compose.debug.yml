# Useful Link: https://learn.microsoft.com/en-us/aspnet/core/security/docker-compose-https?view=aspnetcore-10.0#macos-or-linux

services:
  api:
    container_name: PokemonLocations-Api
    build:
      context: ./Backend
      dockerfile: PokemonLocations.Api/Dockerfile
    ports:
      - "8080:8080"
      - "8081:8081"
    environment:
      - ConnectionStrings__Postgres=Host=db;Port=5432;Database=pokemonlocations;Username=postgres;Password=example
      - ASPNETCORE_URLS=http://+:8080;https://+:8081
      - ASPNETCORE_Environment=Development
      - ASPNETCORE_Kestrel__Certificates__Default__Password=password
      - ASPNETCORE_Kestrel__Certificates__Default__Path=/https/aspnetapp.pfx
      - Jwt__Key=local-dev-jwt-key-must-be-at-least-32-bytes-long-for-hs256!
      - Jwt__Issuer=pokemon-locations-api
      - Jwt__Audience=pokemon-locations-clients
    volumes:
      - ~/.aspnet/https:/https:ro
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:17
    container_name: PokemonLocations-DB
    restart: always
    shm_size: 128mb
    environment:
      POSTGRES_DB: pokemonlocations
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: example
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/
      - ./WebServer/Database/Init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d pokemonlocations"]
      interval: 2s
      timeout: 3s
      retries: 15

  cache:
    image: redis:8-alpine
    container_name: PokemonLocations-Cache
    profiles: ["frontend"]
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  webserver:
    container_name: PokemonLocations-WebServer
    profiles: ["frontend"]
    build:
      context: ./Backend
      dockerfile: PokemonLocations.WebServer/Dockerfile
    ports:
      - "3001:8080"
      - "3002:8081"
    environment:
      - ConnectionStrings__Postgres=Host=db;Port=5432;Database=pokemonlocations_webserver;Username=postgres;Password=example
      - ConnectionStrings__Redis=cache:6379
      - ASPNETCORE_URLS=http://+:8080;https://+:8081
      - ASPNETCORE_Environment=Development
      - ASPNETCORE_Kestrel__Certificates__Default__Password=password
      - ASPNETCORE_Kestrel__Certificates__Default__Path=/https/aspnetapp.pfx
      - Jwt__Key=local-dev-jwt-key-must-be-at-least-32-bytes-long-for-hs256!
      - Jwt__Issuer=pokemon-locations-api
      - Jwt__Audience=pokemon-locations-clients
      - PokemonLocationsApi__BaseUrl=http://api:8080
    volumes:
      - ~/.aspnet/https:/https:ro
      - webserver_uploads:/app/uploads
    depends_on:
      api:
        condition: service_started
      cache:
        condition: service_started
      db:
        condition: service_healthy

volumes:
  redis_data:
  postgres_data:
  webserver_uploads:
