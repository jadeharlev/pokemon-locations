<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pokemon Locations - Locations</title>

  <script src="script.js" defer></script>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />

  <style>
    body {
      margin: 0;
      background-color: #ffffff;
      font-family: Arial, sans-serif;
      color: #111111;
    }

    .page-frame {
      width: 100%;
      min-height: 100vh;
      background: #ffffff;
    }

    .top-nav {
      background: #f3f3f3;
      border-bottom: 2px solid #222;
      padding: 18px 48px;
    }

    .nav-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .nav-left,
    .nav-right {
      display: flex;
      align-items: center;
    }

    .nav-left {
      gap: 42px;
    }

    .nav-right {
      gap: 18px;
    }

    .top-nav a {
      text-decoration: none;
      color: #000000;
      font-size: 22px;
      transition: color 0.2s ease;
    }

    .top-nav a.nav-link-main {
      font-weight: 700;
    }

    .top-nav a.active {
      color: #2457ff;
    }

    .top-nav a.nav-link-main:not(.active):hover {
      color: #7db7ff;
    }

    .sign-in-link {
      font-weight: 400;
      display: inline-block;
    }

    .sign-in-link:hover {
      font-weight: 700;
      color: #000000;
    }

    .nav-search-shell {
      position: relative;
      width: 180px;
      height: 46px;
      display: flex;
      justify-content: flex-end;
      flex: 0 0 180px;
    }

    .nav-search {
      position: absolute;
      right: 0;
      top: 0;
      width: 48px;
      height: 46px;
      background: transparent;
      border: none;
      border-radius: 24px;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      overflow: hidden;
      padding: 0 14px;
      cursor: pointer;
      transition: width 0.25s ease, background-color 0.25s ease;
    }

    .nav-search:hover,
    .nav-search:focus-within {
      width: 180px;
      background: #fafafa;
    }

    .search-icon {
      width: 20px;
      height: 20px;
      flex: 0 0 20px;
      margin-right: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .search-icon svg {
      display: block;
      width: 20px;
      height: 20px;
    }

    .nav-search-input {
      width: 100%;
      border: none;
      outline: none;
      background: transparent;
      font-size: 20px;
      color: #111111;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.15s ease;
    }

    .nav-search:hover .nav-search-input,
    .nav-search:focus-within .nav-search-input {
      opacity: 1;
      pointer-events: auto;
    }

    .nav-search-input::placeholder {
      color: #a0a0a0;
      opacity: 1;
    }

    .content-area {
      padding: 34px 0 60px 0;
    }

    .search-wrap {
      width: 56%;
      max-width: 780px;
      min-width: 320px;
      margin: 0 auto 52px auto;
      background: #d9d9d9;
      border-radius: 18px;
      display: flex;
      align-items: center;
      padding: 12px 18px;
      transition: background-color 0.2s ease, box-shadow 0.2s ease;
    }

    .search-wrap:hover {
      background: #c9c9c9;
    }

    .search-wrap:focus-within {
      background: #c9c9c9;
      box-shadow: 0 0 0 3px #9ec5ff;
    }

    .page-search-icon {
      font-size: 30px;
      line-height: 1;
      margin-right: 12px;
      color: #111111;
    }

    .page-search-input {
      width: 100%;
      border: none;
      outline: none;
      background: transparent;
      font-size: 28px;
      color: #111111;
    }

    .page-search-input::placeholder {
      color: #111111;
      opacity: 1;
    }

    .location-list {
      width: 64%;
      max-width: 900px;
      margin: 0 auto;
    }

    .location-card {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 138px;
      margin-bottom: 18px;
      background: #d9d9d9;
      color: #000000;
      text-decoration: none;
      font-size: 66px;
      font-weight: 700;
      transition: background-color 0.2s ease;
    }

    .location-card:hover {
      background: #bfbfbf;
      color: #000000;
    }

    .database-note {
      text-align: center;
      font-size: 18px;
      color: #444444;
      margin-top: 22px;
    }

    @media (max-width: 992px) {
      .top-nav {
        padding: 16px 24px;
      }

      .top-nav a {
        font-size: 18px;
      }

      .nav-left {
        gap: 22px;
      }

      .nav-right {
        gap: 12px;
      }

      .nav-search-shell {
        width: 150px;
        flex-basis: 150px;
      }

      .nav-search:hover,
      .nav-search:focus-within {
        width: 150px;
      }

      .nav-search-input {
        font-size: 17px;
      }

      .search-wrap {
        width: 78%;
      }

      .location-list {
        width: 78%;
      }

      .page-search-input {
        font-size: 22px;
      }

      .location-card {
        font-size: 42px;
        height: 110px;
      }
    }

    @media (max-width: 600px) {
      .nav-row {
        flex-direction: column;
        align-items: flex-start;
        gap: 12px;
      }

      .nav-left {
        flex-wrap: wrap;
        gap: 14px;
      }

      .nav-right {
        width: 100%;
        justify-content: space-between;
      }

      .nav-search-shell {
        width: 140px;
        flex-basis: 140px;
      }

      .nav-search:hover,
      .nav-search:focus-within {
        width: 140px;
      }

      .search-wrap,
      .location-list {
        width: 90%;
        min-width: 0;
      }

      .location-card {
        font-size: 30px;
        height: 90px;
      }

      .database-note {
        font-size: 16px;
        padding: 0 16px;
      }
    }
  </style>
</head>
<body>
  <div class="page-frame">
    <nav class="top-nav">
      <div class="nav-row">
        <div class="nav-left">
          <a href="index.html" class="nav-link-main">HOME</a>
          <a href="locations.html" class="nav-link-main active">LOCATIONS</a>
          <a href="favorites.html" class="nav-link-main">FAVORITES</a>
        </div>

        <div class="nav-right">
          <div class="nav-search-shell">
            <div class="nav-search">
              <span class="search-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none" stroke="#000000" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                  <circle cx="10.5" cy="10.5" r="5.5"></circle>
                  <line x1="15" y1="15" x2="21" y2="21"></line>
                </svg>
              </span>
              <input
                type="text"
                class="nav-search-input"
                placeholder="Search"
              />
            </div>
          </div>
          <a href="signin.html" class="sign-in-link">Sign In</a>
        </div>
      </div>
    </nav>

    <main class="content-area">
      <div class="search-wrap">
        <span class="page-search-icon">&#128269;</span>
        <input type="text" class="page-search-input" placeholder="Search" />
      </div>

      <div class="location-list">
        <a href="#" class="location-card">Pallet Town</a>
        <a href="#" class="location-card">Viridian City</a>
        <a href="#" class="location-card">Pewter City</a>
      </div>

      <p class="database-note">
        Additional cities and locations will appear here as they are loaded from the database.
      </p>
    </main>
  </div>

  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
  ></script>
</body>
</html>
