<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up — PokéLocs</title>
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/favicon-192.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/favicon-180.png" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
    <script>
        (function () {
            const valid = ['bulbasaur', 'charmander', 'squirtle', 'pikachu'];
            const cached = sessionStorage.getItem('pl.theme');
            const name = valid.includes(cached) ? cached : 'pikachu';
            document.write(`<link id="theme-stylesheet" rel="stylesheet" href="/css/themes/${name}.css">`);
        })();
    </script>
    <style>
        body {
            font-family: 'Inter', Arial, sans-serif;
            background: var(--theme-primary-pale);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem 0;
        }
        .auth-card {
            background: #FFF;
            border-radius: 12px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
            padding: 2.5rem;
            width: 100%;
            max-width: 420px;
        }
        .auth-card h1 {
            color: var(--theme-primary-dark);
            font-weight: 700;
            margin-bottom: 1.5rem;
        }
        .btn-primary {
            background: var(--theme-primary);
            border-color: var(--theme-primary);
        }
        .btn-primary:hover, .btn-primary:focus {
            background: var(--theme-primary-dark);
            border-color: var(--theme-primary-dark);
        }
    </style>
</head>
<body>
    <div class="auth-card">
        <h1>Create your account</h1>
        <form id="signup-form" novalidate>
            <div class="mb-3">
                <label for="email" class="form-label">Email</label>
                <input type="email" class="form-control" id="email" required autocomplete="username" />
            </div>
            <div class="mb-3">
                <label for="display-name" class="form-label">Display name</label>
                <input type="text" class="form-control" id="display-name" maxlength="50" required autocomplete="nickname" />
            </div>
            <div class="mb-3">
                <label for="password" class="form-label">Password</label>
                <input type="password" class="form-control" id="password" minlength="8" required autocomplete="new-password" />
                <div class="form-text">Minimum 8 characters.</div>
            </div>
            <div class="mb-3">
                <label for="confirm-password" class="form-label">Confirm password</label>
                <input type="password" class="form-control" id="confirm-password" minlength="8" required autocomplete="new-password" />
            </div>
            <div id="error-message" class="alert alert-danger d-none" role="alert"></div>
            <button type="submit" class="btn btn-primary w-100">Create account</button>
            <p class="text-center mt-3 mb-0">
                Already have an account? <a href="/signin.html">Sign in</a>
            </p>
        </form>
    </div>

    <script src="/js/auth.js"></script>
    <script>
        const form = document.getElementById('signup-form');
        const errorBox = document.getElementById('error-message');
        const submit = form.querySelector('button[type="submit"]');

        function showError(msg) {
            errorBox.textContent = msg;
            errorBox.classList.remove('d-none');
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorBox.classList.add('d-none');

            const email = document.getElementById('email').value.trim();
            const displayName = document.getElementById('display-name').value.trim();
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirm-password').value;

            if (!email || !displayName || !password) {
                showError('Please fill in every field.');
                return;
            }
            if (password.length < 8) {
                showError('Password must be at least 8 characters.');
                return;
            }
            if (password !== confirm) {
                showError('Passwords do not match.');
                return;
            }

            submit.disabled = true;
            try {
                const res = await fetch('/account/signup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password, displayName })
                });
                if (res.ok) {
                    PLAuth.setCreds(email, password);
                    location.href = '/';
                } else if (res.status === 409) {
                    showError('An account with that email already exists.');
                } else if (res.status === 400) {
                    let detail = 'Please check your input and try again.';
                    try {
                        const body = await res.json();
                        if (body?.errors) {
                            const flat = Object.values(body.errors).flat().join(' ');
                            if (flat) detail = flat;
                        }
                    } catch { /* ignore parse error */ }
                    showError(detail);
                } else {
                    showError(`Sign-up failed (${res.status}).`);
                }
            } catch (err) {
                showError('Network error. Please try again.');
            } finally {
                submit.disabled = false;
            }
        });
    </script>
</body>
</html>
