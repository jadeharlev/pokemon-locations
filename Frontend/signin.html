<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pokemon Locations - Sign In</title>

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />

  <style>
    body {
      margin: 0;
      background-color: #ffffff;
      font-family: Arial, sans-serif;
      color: #111111;
    }

    .page-frame {
      width: 100%;
      min-height: 100vh;
      background: #ffffff;
    }

    .top-nav {
      background: #f3f3f3;
      border-bottom: 2px solid #222;
      padding: 18px 48px;
    }

    .nav-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .nav-left,
    .nav-right {
      display: flex;
      align-items: center;
    }

    .nav-left {
      gap: 42px;
    }

    .nav-right {
      gap: 18px;
    }

    .top-nav a {
      text-decoration: none;
      color: #000000;
      font-size: 22px;
      transition: color 0.2s ease;
    }

    .top-nav a.nav-link-main {
      font-weight: 700;
    }

    .top-nav a.active {
      color: #2457ff;
    }

    .top-nav a.nav-link-main:not(.active):hover {
      color: #7db7ff;
    }

    .sign-in-link {
      font-weight: 400;
      display: inline-block;
    }

    .sign-in-link:hover {
      font-weight: 700;
      color: #000000;
    }

    .nav-search-shell {
      position: relative;
      width: 180px;
      height: 46px;
      display: flex;
      justify-content: flex-end;
      flex: 0 0 180px;
    }

    .nav-search {
      position: absolute;
      right: 0;
      top: 0;
      width: 48px;
      height: 46px;
      background: transparent;
      border: none;
      border-radius: 24px;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      overflow: hidden;
      padding: 0 14px;
      cursor: pointer;
      transition: width 0.25s ease, background-color 0.25s ease;
    }

    .nav-search:hover,
    .nav-search:focus-within {
      width: 180px;
      background: #fafafa;
    }

    .search-icon {
      width: 20px;
      height: 20px;
      flex: 0 0 20px;
      margin-right: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .search-icon svg {
      display: block;
      width: 20px;
      height: 20px;
    }

    .nav-search-input {
      width: 100%;
      border: none;
      outline: none;
      background: transparent;
      font-size: 20px;
      color: #111111;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.15s ease;
    }

    .nav-search:hover .nav-search-input,
    .nav-search:focus-within .nav-search-input {
      opacity: 1;
      pointer-events: auto;
    }

    .nav-search-input::placeholder {
      color: #a0a0a0;
      opacity: 1;
    }

    .signin-section {
      min-height: calc(100vh - 80px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 60px 24px;
    }

    .signin-card {
      width: 100%;
      max-width: 560px;
      background: #ececec;
      border-radius: 24px;
      padding: 48px 40px;
    }

    .signin-title {
      font-size: 52px;
      font-weight: 700;
      text-align: center;
      margin-bottom: 30px;
      color: #000000;
    }

    .form-label {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .form-control {
      height: 58px;
      font-size: 20px;
      border: none;
      border-radius: 14px;
      background: #d9d9d9;
      color: #111111;
    }

    .form-control:focus {
      background: #d1d1d1;
      box-shadow: 0 0 0 3px #9ec5ff;
    }

    .signin-button {
      width: 100%;
      border: none;
      background: #2457ff;
      color: #ffffff;
      font-size: 22px;
      font-weight: 700;
      padding: 15px 20px;
      border-radius: 14px;
      transition: background-color 0.2s ease;
      margin-top: 8px;
    }

    .signin-button:hover {
      background: #1b45cc;
    }

    .error-message {
      display: none;
      margin-top: 18px;
      color: #c62828;
      font-size: 18px;
      font-weight: 600;
      text-align: center;
    }

    .success-message {
      display: none;
      margin-top: 18px;
      color: #1b5e20;
      font-size: 18px;
      font-weight: 600;
      text-align: center;
    }

    .signin-helper {
      margin-top: 20px;
      font-size: 17px;
      color: #555555;
      text-align: center;
    }

    .signin-helper a {
      color: #2457ff;
      text-decoration: none;
      font-weight: 600;
    }

    .signin-helper a:hover {
      text-decoration: underline;
    }

    @media (max-width: 992px) {
      .top-nav {
        padding: 16px 24px;
      }

      .top-nav a {
        font-size: 18px;
      }

      .nav-left {
        gap: 22px;
      }

      .nav-right {
        gap: 12px;
      }

      .nav-search-shell {
        width: 150px;
        flex-basis: 150px;
      }

      .nav-search:hover,
      .nav-search:focus-within {
        width: 150px;
      }

      .nav-search-input {
        font-size: 17px;
      }

      .signin-title {
        font-size: 42px;
      }
    }

    @media (max-width: 600px) {
      .nav-row {
        flex-direction: column;
        align-items: flex-start;
        gap: 12px;
      }

      .nav-left {
        flex-wrap: wrap;
        gap: 14px;
      }

      .nav-right {
        width: 100%;
        justify-content: space-between;
      }

      .nav-search-shell {
        width: 140px;
        flex-basis: 140px;
      }

      .nav-search:hover,
      .nav-search:focus-within {
        width: 140px;
      }

      .signin-card {
        padding: 36px 22px;
      }

      .signin-title {
        font-size: 34px;
      }

      .form-control {
        font-size: 18px;
      }
    }
  </style>
</head>
<body>
  <div class="page-frame">
    <nav class="top-nav">
      <div class="nav-row">
        <div class="nav-left">
          <a href="index.html" class="nav-link-main">HOME</a>
          <a href="locations.html" class="nav-link-main">LOCATIONS</a>
          <a href="favorites.html" class="nav-link-main">FAVORITES</a>
        </div>

        <div class="nav-right">
          <div class="nav-search-shell">
            <div class="nav-search">
              <span class="search-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none" stroke="#000000" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                  <circle cx="10.5" cy="10.5" r="5.5"></circle>
                  <line x1="15" y1="15" x2="21" y2="21"></line>
                </svg>
              </span>
              <input type="text" class="nav-search-input" placeholder="Search" />
            </div>
          </div>
          <a href="signin.html" class="sign-in-link active">Sign In</a>
        </div>
      </div>
    </nav>

    <main class="signin-section">
      <div class="signin-card">
        <h1 class="signin-title">Sign In</h1>

        <form id="signinForm">
          <div class="mb-3">
            <label for="username" class="form-label">Email or Username</label>
            <input
              type="text"
              id="username"
              class="form-control"
              placeholder="Enter email or username"
              required
            />
          </div>

          <div class="mb-3">
            <label for="password" class="form-label">Password</label>
            <input
              type="password"
              id="password"
              class="form-control"
              placeholder="Enter password"
              required
            />
          </div>

          <button type="submit" class="signin-button">Sign In</button>

          <div id="errorMessage" class="error-message">
            Incorrect username/email or password.
          </div>

          <div id="successMessage" class="success-message">
            Login successful. Redirecting...
          </div>
        </form>

        <p class="signin-helper">
          Don't have an account?
          <a href="signup.html">Sign Up</a>
        </p>
      </div>
    </main>
  </div>

  <script>
    const signinForm = document.getElementById("signinForm");
    const errorMessage = document.getElementById("errorMessage");
    const successMessage = document.getElementById("successMessage");

    signinForm.addEventListener("submit", function (event) {
      event.preventDefault();

      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value;

      errorMessage.style.display = "none";
      successMessage.style.display = "none";

      const validUsername = "trainer";
      const validEmail = "trainer@example.com";
      const validPassword = "pikachu123";

      if (
        (username === validUsername || username === validEmail) &&
        password === validPassword
      ) {
        successMessage.style.display = "block";

        setTimeout(function () {
          window.location.href = "index.html";
        }, 1200);
      } else {
        errorMessage.style.display = "block";
      }
    });
  </script>

  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
  ></script>
</body>
</html>
